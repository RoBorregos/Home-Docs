site_name: Roborregos@Home Docs
theme:
  name: material
  highlightjs: true
  logo: "assets/logo.png"
  favicon: "assets/favicon.png"
  features:
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
  palette:
    scheme: default
    primary: blue
    accent: blue
  font:
    text: Inter, Roboto, sans-serif
    code: Roboto Mono, monospace

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes

validation:
  links:
    absolute_links: relative_to_docs

plugins:
  - search
  - awesome-pages

extra_javascript:
  # polyfill.io was decommissioned in 2024 — removed to stop ERR_NAME_NOT_RESOLVED.
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/javascripts/scroll-unlock.js
  - assets/javascripts/mermaid-init.js
